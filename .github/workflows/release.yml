name: Release

"on":
  workflow_dispatch:
    inputs:
      tag:
        description: Plain SemVer tag to release, for example 0.1.0
        required: true
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  package:
    name: Notarized release app
    runs-on: macos-26
    timeout-minutes: 360
    env:
      APPLE_DEVELOPMENT_CERT_BASE64: ${{ secrets.APPLE_DEVELOPMENT_CERT_BASE64 }}
      DEVELOPER_ID_APPLICATION_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERT_BASE64 }}
      CERTIFICATE_SECRET: ${{ secrets.CERTIFICATE_SECRET }}
      KEYCHAIN_SECRET: ${{ secrets.KEYCHAIN_SECRET }}
      OPENJOYSTICKDRIVER_GUI_DEVID_PROFILE_BASE64: ${{ secrets.OPENJOYSTICKDRIVER_GUI_DEVID_PROFILE_BASE64 }}
      OPENJOYSTICKDRIVER_DAEMON_DEVID_PROFILE_BASE64: ${{ secrets.OPENJOYSTICKDRIVER_DAEMON_DEVID_PROFILE_BASE64 }}
      OPENJOYSTICKDRIVER_DEXT_PROFILE_BASE64: ${{ secrets.OPENJOYSTICKDRIVER_DEXT_PROFILE_BASE64 }}
      NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
      NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          if [[ ! "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: release tag must be plain SemVer, for example 0.1.0"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install dependencies
        run: |
          brew install libusb
          brew install swiftlint

      - name: Validate profiles
        run: ./scripts/ojd validate profiles

      - name: Lint Swift
        run: ./scripts/ojd lint

      - name: Run tests
        run: swift test

      - name: Set up release signing
        run: ./scripts/ojd-ci-release-setup.sh

      - name: Package release build
        run: |
          ./scripts/ojd package release "${{ steps.release.outputs.tag }}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: OpenJoystickDriver-${{ steps.release.outputs.tag }}
          path: .build/release-artifacts/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: OpenJoystickDriver ${{ steps.release.outputs.tag }}
          files: .build/release-artifacts/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
