name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-swiftpm:
    name: macOS SwiftPM
    runs-on: macos-26
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Library/Developer/CommandLineTools
      SDKROOT: /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Toolchain
        run: |
          sw_vers
          xcrun --find swiftc
          swift --version
          xcodebuild -version || true

      - name: Install dependencies
        run: |
          brew install libusb

      - name: Validate controller profiles
        run: |
          bash scripts/ojd validate profiles

      - name: Build package
        run: |
          swift build

      - name: Run tests
        run: |
          swift test
